# Jarvis Mini 1.0 — ~14–16B params (classe LLaMA/Qwen ~14B), GCP Megatron/DeepSpeed.
# Ajuster micro_batch / parallélisme selon VRAM et nombre de GPU.
name: jarvis-mini-1.0
architecture: gpt_decoder
hidden_size: 5120
num_layers: 40
num_attention_heads: 40
intermediate_size: 13824
vocab_size: 50257
max_position_embeddings: 4096
tie_word_embeddings: true

training:
  global_batch_size: 256
  micro_batch_size: 1
  sequence_length: 4096
  train_steps: 200000
  save_interval: 100
  lr: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 4000
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  bf16: true

optimizer: adamw
