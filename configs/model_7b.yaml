# Profile ~7B — multi-GPU / multi-node on GCP (Megatron/DeepSpeed).
name: jarvis-7b
architecture: gpt_decoder
hidden_size: 4096
num_layers: 32
num_attention_heads: 32
intermediate_size: 11008
vocab_size: 50257
max_position_embeddings: 4096
tie_word_embeddings: true

training:
  global_batch_size: 512
  micro_batch_size: 1
  sequence_length: 4096
  train_steps: 200000
  lr: 3.0e-4
  min_lr: 3.0e-5
  warmup_steps: 4000
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  grad_clip: 1.0
  bf16: true

optimizer: adamw
